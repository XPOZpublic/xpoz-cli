name: ci

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

jobs:
  wheel:
    name: build wheel + entry-point smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # setuptools-scm needs full history for tags

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Build sdist + wheel
        env:
          # On unreleased branches there's no tag; pretend so the build is
          # deterministic and doesn't depend on git state.
          SETUPTOOLS_SCM_PRETEND_VERSION: 0.0.0
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install wheel in a clean venv
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install dist/*.whl

      - name: Smoke-test entry point
        run: |
          /tmp/venv/bin/xpoz-cli --help > /dev/null
          /tmp/venv/bin/xpoz-cli twitter --help > /dev/null
